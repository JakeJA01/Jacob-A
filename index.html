<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHealthApp</title>
    
    <style>
        /* INSERT YOUR ORIGINAL CSS HERE */
        body { 
            /* This is a placeholder: keep your original background and font styles */
            font-family: sans-serif; 
        }

        /* NEW: Minimal Calibration Overlay - hidden by default */
        #cal-overlay {
            position: fixed;
            bottom: -100%; /* Hidden off-screen */
            left: 0;
            width: 100%;
            background: rgba(30, 30, 30, 0.95);
            transition: bottom 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            border-top: 2px solid #007AFF;
            z-index: 1000;
        }
        #cal-overlay.active { bottom: 0; }
        .cal-btn { background: #007AFF; color: white; border: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="main-display">
        <h1 id="sbp-label">0</h1>
        <h1 id="dbp-label">0</h1>
    </div>

    <button onclick="toggleCal()" style="position:fixed; top:10px; right:10px; opacity:0.5;">⚙️ Calibrate</button>

    <div id="cal-overlay">
        <h3 style="color:white; margin-top:0;">Sync Manual Reading</h3>
        <input type="number" id="manualSBP" placeholder="Sys" style="width:60px; padding:5px;">
        <input type="number" id="manualDBP" placeholder="Dia" style="width:60px; padding:5px;">
        <button class="cal-btn" onclick="saveCalibration()">Save Offset</button>
        <button onclick="toggleCal()" style="background:none; color:gray; border:none; margin-left:10px;">Close</button>
    </div>

    <script>
        // --- 1. PRESERVE YOUR ORIGINAL BLE LOGIC ---
        // Keep your handleData, connect, and UUID logic here.

        // --- 2. INTEGRATE CALIBRATION VARIABLES ---
        let sbpOffset = parseFloat(localStorage.getItem('sbp_offset')) || 0;
        let dbpOffset = parseFloat(localStorage.getItem('dbp_offset')) || 0;
        
        // These should be updated by your existing BLE data stream
        let lastRawSBP = 0; 
        let lastRawDBP = 0;

        function toggleCal() {
            document.getElementById('cal-overlay').classList.toggle('active');
        }

        function saveCalibration() {
            const mSBP = parseFloat(document.getElementById('manualSBP').value);
            const mDBP = parseFloat(document.getElementById('manualDBP').value);

            if (mSBP && mDBP && lastRawSBP > 0) {
                sbpOffset = mSBP - lastRawSBP;
                dbpOffset = mDBP - lastRawDBP;
                localStorage.setItem('sbp_offset', sbpOffset);
                localStorage.setItem('dbp_offset', dbpOffset);
                alert("Calibration Updated!");
                toggleCal();
            } else {
                alert("Wait for sensor data before calibrating.");
            }
        }

        // --- 3. APPLY OFFSETS TO YOUR UI ---
        // Find the spot in your original code where you update the text:
        // document.getElementById('sbp-label').innerText = ...
        
        function updateDisplay(rawSBP, rawDBP) {
            lastRawSBP = rawSBP;
            lastRawDBP = rawDBP;

            // Apply offsets
            const finalSBP = Math.round(rawSBP + sbpOffset);
            const finalDBP = Math.round(rawDBP + dbpOffset);

            // Use your original element IDs here
            document.getElementById('sbp-label').innerText = finalSBP;
            document.getElementById('dbp-label').innerText = finalDBP;
        }
    </script>
</body>
</html>
