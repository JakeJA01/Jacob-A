<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Vitals Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #00d4ff;
            --success: #00ff00;
            --warning: #ffff00;
            --danger: #ff4444;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-weight: 300; color: var(--accent); margin-bottom: 5px; }
        #status { font-size: 0.9rem; margin-bottom: 10px; color: var(--danger); text-transform: uppercase; letter-spacing: 2px; }
        .connected { color: var(--success) !important; }

        .container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; }
        .card { 
            background: var(--card-bg); border-radius: 24px; padding: 25px; 
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label-text { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .data-val { font-size: 3.5rem; font-weight: 800; margin: 5px 0; font-family: monospace; display: flex; align-items: baseline; justify-content: center; }
        .unit { font-size: 1.2rem; color: var(--accent); margin-left: 8px; }

        /* Timer UI */
        #timer-box { color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        
        button { 
            background: var(--accent); color: black; border: none; padding: 12px 24px; 
            border-radius: 50px; font-weight: bold; cursor: pointer;
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #downloadBtn { background: var(--success); display: none; }

        canvas { height: 150px !important; }
    </style>
</head>
<body>

    <h1>Vitals Monitor</h1>
    <div id="status">Disconnected</div>
    
    <div id="timer-box">Session Time: <span id="timer-val">60</span>s</div>
    
    <div class="btn-group">
        <button id="connectBtn" onclick="connectBLE()">1. Connect Sensor</button>
        <button id="startBtn" onclick="startSession()" disabled>2. Start 60s Reading</button>
        <button id="downloadBtn" onclick="downloadCSV()">Download CSV</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="label-text">Blood Pressure (Calibrated)</div>
            <div class="data-val"><span id="bp_display">--/--</span><span class="unit">mmHg</span></div>
            <div id="bp_status" style="font-size: 0.8rem; color: #666;">Sync with manual cuff below</div>
            <div style="margin-top:15px;">
                <input type="number" id="sys_input" placeholder="SYS" style="width:50px; background:#222; color:white; border:1px solid #444; padding:5px;">
                <input type="number" id="dia_input" placeholder="DIA" style="width:50px; background:#222; color:white; border:1px solid #444; padding:5px;">
                <button onclick="updateBP()" style="padding:5px 10px; font-size:0.7rem;">Set Offset</button>
            </div>
        </div>

        <div class="card">
            <div class="label-text">Heart Rate</div>
            <div class="data-val"><span id="bpm_val">--</span><span class="unit">BPM</span></div>
            <canvas id="pulseChart"></canvas>
        </div>
    </div>

    <script>
        let isRecording = false;
        let sessionData = [];
        let timerInterval;
        let timeLeft = 60;

        // Calibration Offsets
        let sbpOffset = parseFloat(localStorage.getItem('sbp_offset')) || 0;
        let dbpOffset = parseFloat(localStorage.getItem('dbp_offset')) || 0;
        let lastRawSBP = 110, lastRawDBP = 70;

        // Chart Setup
        const ctx = document.getElementById('pulseChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(100).fill(''), datasets: [{ data: [], borderColor: '#00d4ff', borderWidth: 2, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { display: false }, x: { display: false } } }
        });

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'QT_Py_ESP32S3' }],
                    optionalServices: ["12345678-1234-1234-1234-123456789012"]
                });
                const server = await device.gatt.connect();
                document.getElementById('status').innerText = "Connected";
                document.getElementById('status').classList.add('connected');
                document.getElementById('startBtn').disabled = false;
                
                const service = await server.getPrimaryService("12345678-1234-1234-1234-123456789012");
                const char = await service.getCharacteristic("87654321-4321-4321-4321-210987654321");
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', handleData);
            } catch (e) { alert("BLE Error: " + e); }
        }

        function startSession() {
            isRecording = true;
            sessionData = [];
            timeLeft = 60;
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('startBtn').disabled = true;

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if (timeLeft <= 0) stopSession();
            }, 1000);
        }

        function stopSession() {
            isRecording = false;
            clearInterval(timerInterval);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('downloadBtn').style.display = 'inline-block';
            alert("Session Complete! Data ready for download.");
        }

        function handleData(event) {
            const value = new TextDecoder().decode(event.target.value);
            const [ir, red] = value.split(',').map(Number);

            // Calculate current calibrated values
            const currentSBP = Math.round(lastRawSBP + sbpOffset);
            const currentDBP = Math.round(lastRawDBP + dbpOffset);

            // If recording, push to session array
            if (isRecording) {
                sessionData.push({
                    timestamp: new Date().toLocaleTimeString(),
                    ir: ir,
                    red: red,
                    sbp: currentSBP,
                    dbp: currentDBP
                });
            }

            // Update Chart & UI Logic...
            chart.data.datasets[0].data.push(ir);
            if (chart.data.datasets[0].data.length > 100) chart.data.datasets[0].data.shift();
            chart.update('none');
            
            document.getElementById('bp_display').innerText = `${currentSBP}/${currentDBP}`;
        }

        function downloadCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Time,IR,Red,SBP,DBP\n";
            sessionData.forEach(r => {
                csvContent += `${r.timestamp},${r.ir},${r.red},${r.sbp},${r.dbp}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "MyHealthData_Session.csv");
            document.body.appendChild(link);
            link.click();
        }

        function updateBP() {
            const s = parseInt(document.getElementById('sys_input').value);
            const d = parseInt(document.getElementById('dia_input').value);
            if (s && d) {
                sbpOffset = s - lastRawSBP;
                dbpOffset = d - lastRawDBP;
                localStorage.setItem('sbp_offset', sbpOffset);
                localStorage.setItem('dbp_offset', dbpOffset);
                alert("Calibration Offset Saved!");
            }
        }
    </script>
</body>
</html>
