<script>
    let chart;
    const BUFFER_SIZE = 100; 
    let irBuffer = [];
    let redBuffer = [];
    
    // Smoothing Buffers
    let bpmHistory = [];
    const SMOOTHING_WINDOW = 5; // Average the last 5 readings

    // Setup Chart
    const ctx = document.getElementById('pulseChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(BUFFER_SIZE).fill(''),
            datasets: [{
                label: 'Pulse Wave',
                data: [],
                borderColor: '#00d4ff',
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: { y: { display: false }, x: { display: false } },
            plugins: { legend: { display: false } }
        }
    });

    async function connectBLE() {
        const serviceUuid = "12345678-1234-1234-1234-123456789012";
        const charUuid = "87654321-4321-4321-4321-210987654321";

        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QT_Py_ESP32S3' }],
                optionalServices: [serviceUuid]
            });

            const server = await device.gatt.connect();
            document.getElementById('status').innerText = "Status: Connected";
            document.getElementById('status').classList.add('connected');

            const service = await server.getPrimaryService(serviceUuid);
            const characteristic = await service.getCharacteristic(charUuid);

            await characteristic.startNotifications();
            
            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const value = new TextDecoder().decode(event.target.value);
                const parts = value.split(',');
                if (parts.length < 2) return;

                const ir = parseInt(parts[0]);
                const red = parseInt(parts[1]);

                irBuffer.push(ir);
                redBuffer.push(red);

                if (irBuffer.length > BUFFER_SIZE) {
                    irBuffer.shift();
                    redBuffer.shift();
                }

                updateVisualization(ir);

                // Run calculation every 10 samples (sliding window)
                if (irBuffer.length === BUFFER_SIZE && ir % 10 === 0) {
                    processVitals();
                }
            });

        } catch (error) {
            console.error(error);
            alert("Connection failed.");
        }
    }

    function updateVisualization(val) {
        chart.data.datasets[0].data.push(val);
        if (chart.data.datasets[0].data.length > BUFFER_SIZE) chart.data.datasets[0].data.shift();
        chart.update('none');
    }

    function processVitals() {
        // --- 1. PRE-PROCESSING ---
        const irMax = Math.max(...irBuffer);
        const irMin = Math.min(...irBuffer);
        const irAvg = irBuffer.reduce((a, b) => a + b) / irBuffer.length;
        const irAC = irMax - irMin;
        
        const redMax = Math.max(...redBuffer);
        const redMin = Math.min(...redBuffer);
        const redAvg = redBuffer.reduce((a, b) => a + b) / redBuffer.length;
        const redAC = redMax - redMin;

        // --- 2. PEAK DETECTION (With Noise Filter) ---
        let peaks = 0;
        // Sensitivity: Must be at least 10% above average to count as a peak
        const threshold = irAvg + (irAC * 0.1); 
        
        for (let i = 1; i < irBuffer.length - 1; i++) {
            if (irBuffer[i] > threshold && 
                irBuffer[i] > irBuffer[i-1] && 
                irBuffer[i] > irBuffer[i+1]) {
                peaks++;
                i += 4; // Skip a few samples to avoid "double counting" the same peak
            }
        }
        
        // --- 3. CALCULATION ---
        const samplingRate = 20; // Matches delay(50) on ESP32
        const durationSeconds = BUFFER_SIZE / samplingRate;
        const rawBpm = (peaks / durationSeconds) * 60;

        // SpO2 Ratio of Ratios
        const R = (redAC / redAvg) / (irAC / irAvg);
        let spo2 = 110 - (25 * R);
        if (spo2 > 100) spo2 = 100;
        if (spo2 < 85) spo2 = 85; // Floor it to avoid wild drops

        // --- 4. SMOOTHING (Moving Average) ---
        if (rawBpm > 45 && rawBpm < 160) {
            bpmHistory.push(rawBpm);
            if (bpmHistory.length > SMOOTHING_WINDOW) bpmHistory.shift();
            
            const smoothedBpm = bpmHistory.reduce((a, b) => a + b) / bpmHistory.length;

            // Update UI
            document.getElementById('bpm_val').innerText = Math.round(smoothedBpm);
            document.getElementById('spo2_val').innerText = Math.round(spo2);
        }
    }
</script>
