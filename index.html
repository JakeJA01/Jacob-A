<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHealthApp - Calibrated</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; text-align: center; padding: 20px; }
        .display-card { background: #1a1a1a; padding: 30px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .bp-value { font-size: 4em; font-weight: bold; color: #00ff00; }
        .label { color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        #calibration-ui { background: #222; padding: 20px; border-radius: 15px; border-left: 5px solid #007AFF; text-align: left; }
        input { width: 70px; padding: 10px; border-radius: 8px; border: none; margin-right: 10px; background: #333; color: white; font-size: 16px; }
        button { background: #007AFF; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status { color: #555; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>MyHealthApp</h1>

    <div class="display-card">
        <div class="label">Blood Pressure (Calibrated)</div>
        <div class="bp-value" id="bp-display">-- / --</div>
        <div class="status" id="status-text">Disconnected</div>
    </div>

    <div id="calibration-ui">
        <h3 style="margin: 0 0 10px 0;">Personal Calibration</h3>
        <p style="font-size: 0.9em; color: #ccc;">Enter your manual cuff reading to sync the sensor:</p>
        
        <div style="margin-bottom: 15px;">
            <input type="number" id="manualSBP" placeholder="Sys">
            <input type="number" id="manualDBP" placeholder="Dia">
            <button onclick="saveCalibration()">Sync</button>
        </div>
        
        <button id="connectBtn" style="background: #28a745; width: 100%;">Connect ESP32-S3</button>
    </div>

    <script>
        // --- CALIBRATION LOGIC ---
        // Load saved offsets from the iPhone's storage
        let sbpOffset = parseFloat(localStorage.getItem('sbp_offset')) || 0;
        let dbpOffset = parseFloat(localStorage.getItem('dbp_offset')) || 0;
        
        // Variables to hold the raw values from ESP32
        let lastRawSBP = 0;
        let lastRawDBP = 0;

        function saveCalibration() {
            const mSBP = parseFloat(document.getElementById('manualSBP').value);
            const mDBP = parseFloat(document.getElementById('manualDBP').value);

            if (mSBP && mDBP && lastRawSBP > 0) {
                // Calculate the difference between reality (cuff) and sensor
                sbpOffset = mSBP - lastRawSBP;
                dbpOffset = mDBP - lastRawDBP;

                // Store it permanently on this phone
                localStorage.setItem('sbp_offset', sbpOffset);
                localStorage.setItem('dbp_offset', dbpOffset);

                alert("Calibration successful! Your personal offset is saved.");
                updateUI();
            } else {
                alert("Please connect the sensor and get a reading first.");
            }
        }

        // --- BLE LOGIC (FOR BLUEFY) ---
        const connectBtn = document.getElementById('connectBtn');
        const bpDisplay = document.getElementById('bp-display');
        const statusText = document.getElementById('status-text');

        connectBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Searching for ESP32...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['battery_service'] // Replace with your actual service UUID
                });

                const server = await device.gatt.connect();
                statusText.innerText = "Connected!";
                
                // Note: Replace these UUIDs with the ones from your ESP32-S3 code
                // This is where the ESP32 sends the blood pressure data
                device.addEventListener('gattserverdisconnected', () => {
                    statusText.innerText = "Disconnected";
                });

                // EXAMPLE: Listening for notifications
                // const service = await server.getPrimaryService('your_service_uuid');
                // const characteristic = await service.getCharacteristic('your_char_uuid');
                // characteristic.startNotifications();
                // characteristic.addEventListener('characteristicvaluechanged', handleData);

            } catch (error) {
                statusText.innerText = "Error: " + error;
            }
        });

        function handleData(event) {
            let value = event.target.value;
            // Assuming ESP32 sends two bytes: [SBP, DBP]
            lastRawSBP = value.getUint8(0);
            lastRawDBP = value.getUint8(1);
            updateUI();
        }

        function updateUI() {
            // Apply the "Personal Offset" to the raw sensor data
            const finalSBP = Math.round(lastRawSBP + sbpOffset);
            const finalDBP = Math.round(lastRawDBP + dbpOffset);
            
            bpDisplay.innerText = `${finalSBP} / ${finalDBP}`;
        }
    </script>
</body>
</html>
