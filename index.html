<!DOCTYPE html>
<html>
<body>
  <h1>Pulse Ox Dashboard</h1>
  <button onclick="connectBLE()">Connect to QT Py</button>
  <div id="data">Waiting for data...</div>

  <script>
    async function connectBLE() {
      const serviceUuid = "12345678-1234-1234-1234-123456789012";
      const charUuid = "87654321-4321-4321-4321-210987654321";

      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'QT_Py_ESP32S3' }],
        optionalServices: [serviceUuid]
      });

      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(serviceUuid);
      const characteristic = await service.getCharacteristic(charUuid);

      characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', (event) => {
        const value = new TextDecoder().decode(event.target.value);
        const [hr, spo2, conf] = value.split(',');
        document.getElementById('data').innerHTML = 
          `<h2>Heart Rate: ${hr} BPM</h2><h2>SpO2: ${spo2}%</h2><p>Confidence: ${conf}%</p>`;
      });
    }
  </script>
</body>
</html>
